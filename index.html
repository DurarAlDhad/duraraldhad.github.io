<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دُرَرُ الضَّـادِ | Durar Al-Dhad</title>
  <style>

    @font-face {
      font-family: 'AliMeshref';
      src: url('ali-meshref.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #3b2a4e;
      font-family: 'AliMeshref', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: linear-gradient(to right, #4E3A61 50%, #4C7142 50%);
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0 32px;
      direction: rtl;
      position: relative;
      z-index: 2;
      height: 140px;
    }

    .header-right {
      flex: 1;
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }

    .header-right img {
      height: 90px;
      width: auto;
      filter: invert(1);
    }

    .header-center {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4C7142 50%, #4E3A61 50%);
      border-radius: 16px;
      padding: 12px 20px;
      margin: 0;
      align-self: stretch;
    }

    .header-center img {
      height: 110px;
      width: auto;
      filter: invert(1);
    }

    .header-left {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .poem-verse {
      font-family: 'AliMeshref', serif;
      color: #ffffff;
      font-size: 2.5rem;
      line-height: 1.1;
      text-align: right;
      direction: rtl;
      /* nudge text upward by a few pixels without affecting layout */
      position: relative;
      top: -4px;
    }

    .poem-verse .green {
      color: #A1B99B;
    }

    .separator-top {
      height: 7px;
      background: linear-gradient(to right, #3F3150 40%, #345A2A 60%);
    }

    nav {
      background-color: #2B4B22;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 32px;
      direction: rtl;
      position: relative;
      z-index: 2;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      list-style: none;
      direction: rtl;
    }

    .nav-links li {
      display: flex;
      align-items: center;
    }

    .nav-links li a {
      font-family: 'AliMeshref', serif;
      color: #ffffff;
      text-decoration: none;
      font-size: 2.2rem;
      transition: text-decoration 0.15s;
      /* nudge nav text upward slightly */
      position: relative;
      top: -3px;
    }

    .nav-links li a:hover {
      text-decoration: underline;
    }

    .nav-separator {
      color: #c0392b;
      /* match the nav link font size so the dot scales with it */
      font-size: 2rem;
      line-height: 1;
      padding: 0 8px;
      user-select: none;
      position: relative;
      top: -3px;
    }

    .social-icons {
      display: flex;
      align-items: center;
      gap: 20px;
      direction: ltr;
    }

    .social-icons a {
      display: flex;
      align-items: center;
      opacity: 1;
      transition: opacity 0.2s;
    }

    .social-icons a:hover {
      opacity: 0.75;
    }

    .social-icons img {
      width: 38px;
      height: 38px;
      filter: invert(1);
    }

    .separator-bottom {
      height: 7px;
      background-color: #1D341A;
    }

    main {
      position: relative;
      min-height: calc(100vh - 220px);
      overflow: hidden;
    }

    .bg-calligraphy {
      position: absolute;
      top: 0;
      left: 0;
      width: 55%;
      max-width: 700px;
      pointer-events: none;
      user-select: none;
      opacity: 1;
    }

    .main-content {
      position: relative;
      z-index: 1;
      padding: 60px 40px;
    }

  </style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header>

    <div class="header-right">
      <img src="logo-right.svg" alt="دُرَرُ الضَّادِ" />
    </div>

    <div class="header-center">
      <img src="logo-center.svg" alt="دُرَرُ الضَّادِ" />
    </div>

    <div class="header-left">
      <p class="poem-verse">
        وَـ أنْبِئْ بِدُرِّـ <span class="green">الضّـــٰادِ </span> فٖي كُلِّ <span class="green">ضَ</span>يْهَبِ<br>
        ألا إنَّمَا ذِي هِيَـ  خَــيْـــــرُ المَكَـــاتِبِ
      </p>
    </div>

  </header>

  <!-- ─── SEPARATOR LINE 1 (between header and nav) ─── -->
  <div class="separator-top"></div>

  <!-- ─── NAV BAR ─── -->
  <nav>
    <ul class="nav-links">
      <li><a href="#">خـــبَـــــرُ دُرَر الضّـــٰادِ</a></li>
      <li><span class="nav-separator">•</span></li>
      <li><a href="#">رَاسِــلنَا</a></li>
      <li><span class="nav-separator">•</span></li>
      <li><a href="#">كُـــتُبُنا</a></li>
    </ul>

    <div class="social-icons">
      <a href="https://www.threads.com/@duraraldhad" target="_blank" rel="noopener" aria-label="Threads">
        <img src="icon-threads.svg" alt="Threads" />
      </a>
      <a href="https://x.com/DurarAlDhad" target="_blank" rel="noopener" aria-label="X">
        <img src="icon-x.svg" alt="X" />
      </a>
      <a href="https://instagram.com/DurarAlDhad" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="icon-instagram.svg" alt="Instagram" />
      </a>
      <a href="https://t.me/DurarAlDhad" target="_blank" rel="noopener" aria-label="Telegram">
        <img src="icon-telegram.svg" alt="Telegram" />
      </a>
    </div>
  </nav>

  <!-- ─── SEPARATOR LINE 2 (below nav) ─── -->
  <div class="separator-bottom"></div>

  <!-- ─── MAIN BODY ─── -->
  <main>
    <img class="bg-calligraphy" src="background.png" alt="" />
    <div class="main-content">
      <!-- Future content goes here -->
    </div>
  </main>

</body>
</html>
