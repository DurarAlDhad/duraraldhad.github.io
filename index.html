<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دُرَرُ الضَّادِ</title>
  <style>

    @font-face {
      font-family: 'AliMeshref';
      src: url('ali-meshref.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #3b2a4e;
      font-family: 'AliMeshref', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ════════════════════════════
       HEADER
       Left half  → #4E3A61 (purple)
       Right half → #4C7142 (green)
       Split via gradient at 50%
    ════════════════════════════ */
    header {
      background: linear-gradient(to left, #4E3A61 50%, #4C7142 50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      direction: rtl;
      position: relative;
      z-index: 2;
      min-height: 160px;
    }

    /* Right side (RTL = visually right = start): plain logo, on the GREEN half */
    .header-right {
      flex: 1;
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }

    .header-right img {
      height: 130px;
      width: auto;
      filter: invert(1);
    }

    /* Center: rounded box with SWAPPED colors — green bg on purple side, purple bg on green side
       Since the box straddles the middle, we use a split gradient mirrored from the header */
    .header-center {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      /* swapped: right half purple, left half green */
      background: linear-gradient(to left, #4C7142 50%, #4E3A61 50%);
      border-radius: 18px;
      padding: 14px 22px;
      position: relative;
      z-index: 3;
    }

    .header-center img {
      height: 150px;
      width: auto;
      filter: invert(1);
    }

    /* Left side (RTL = visually left = end): poem verse, on the PURPLE half */
    .header-left {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .poem-verse {
      font-family: 'AliMeshref', serif;
      color: #ffffff;
      font-size: 2rem;
      line-height: 1.5;
      text-align: right;
      direction: rtl;
    }

    .poem-verse .green {
      color: #A1B99B;
    }

    /* ════════════════════════════
       TWO SEPARATOR LINES
       Line 1: gradient #3F2D53 → #36592D  (right to left in RTL = purple to green)
       Line 2: solid #1D341A
    ════════════════════════════ */
    .separator {
      height: 4px;
      background: linear-gradient(to left, #3F2D53, #36592D);
    }

    .separator-dark {
      height: 3px;
      background-color: #1D341A;
    }

    /* ════════════════════════════
       NAV BAR — plain, no effects
    ════════════════════════════ */
    nav {
      background-color: #2d5c27;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 40px;
      direction: rtl;
      position: relative;
      z-index: 2;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
      direction: rtl;
    }

    .nav-links li {
      display: flex;
      align-items: center;
    }

    .nav-links li a {
      font-family: 'AliMeshref', serif;
      color: #ffffff;
      text-decoration: none;
      font-size: 1.5rem;
      transition: text-decoration 0.15s;
    }

    .nav-links li a:hover {
      text-decoration: underline;
    }

    .nav-separator {
      color: #c0392b;
      font-size: 1.3rem;
      line-height: 1;
      padding: 0 8px;
      user-select: none;
    }

    .social-icons {
      display: flex;
      align-items: center;
      gap: 20px;
      direction: ltr;
    }

    .social-icons a {
      display: flex;
      align-items: center;
      opacity: 1;
      transition: opacity 0.2s;
    }

    .social-icons a:hover {
      opacity: 0.8;
    }

    .social-icons img {
      width: 26px;
      height: 26px;
      filter: invert(1);
    }

    /* ════════════════════════════
       MAIN BODY
    ════════════════════════════ */
    main {
      position: relative;
      min-height: calc(100vh - 220px);
      overflow: hidden;
    }

    /* Full opacity — image already has its own colors baked in */
    .bg-calligraphy {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-65%);
      width: 62%;
      max-width: 800px;
      pointer-events: none;
      user-select: none;
      opacity: 1;
    }

    .main-content {
      position: relative;
      z-index: 1;
      padding: 60px 40px;
    }

  </style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header>

    <!-- RTL: this is visually on the RIGHT — plain logo — sits on GREEN half -->
    <div class="header-right">
      <img src="logo-right.svg" alt="دُرَرُ الضَّادِ" />
    </div>

    <!-- CENTER: rounded box with swapped colors, fancy logo inside -->
    <div class="header-center">
      <img src="logo-center.svg" alt="دُرَرُ الضَّادِ" />
    </div>

    <!-- RTL: this is visually on the LEFT — poem verse — sits on PURPLE half -->
    <div class="header-left">
      <p class="poem-verse">
        وَـ أنْبِئْ بِدُرِّـ <span class="green">الضّـــٰادِ</span> فٖي كُلِّ <span class="green">ضَيْهَبِ</span><br>
        ألا إنَّمَا ذِي هِيَـ خَــيْـــــرُ المَكَـــاتِبِ
      </p>
    </div>

  </header>

  <!-- ─── TWO SEPARATOR LINES ─── -->
  <div class="separator"></div>
  <div class="separator-dark"></div>

  <!-- ─── NAV BAR ─── -->
  <nav>

    <!-- Right: nav links -->
    <ul class="nav-links">
      <li><a href="#">خـــبَـــــرُ دُرَر الضّـــٰادِ</a></li>
      <li><span class="nav-separator">•</span></li>
      <li><a href="#">رَاسِــلنَا</a></li>
      <li><span class="nav-separator">•</span></li>
      <li><a href="#">كُـــتُبُنا</a></li>
    </ul>

    <!-- Left: social icons -->
    <div class="social-icons">
      <a href="https://www.threads.com/@duraraldhad" target="_blank" rel="noopener" aria-label="Threads">
        <img src="icon-threads.svg" alt="Threads" />
      </a>
      <a href="https://x.com/DurarAlDhad" target="_blank" rel="noopener" aria-label="X">
        <img src="icon-x.svg" alt="X" />
      </a>
      <a href="https://instagram.com/DurarAlDhad" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="icon-instagram.svg" alt="Instagram" />
      </a>
      <a href="https://t.me/DurarAlDhad" target="_blank" rel="noopener" aria-label="Telegram">
        <img src="icon-telegram.svg" alt="Telegram" />
      </a>
    </div>

  </nav>

  <!-- ─── MAIN BODY ─── -->
  <main>
    <img class="bg-calligraphy" src="background.png" alt="" />
    <div class="main-content">
      <!-- Future content goes here -->
    </div>
  </main>

</body>
</html>
